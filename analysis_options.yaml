# This package *provides* a custom_lint plugin; it must NOT enable the
# `custom_lint` analyzer plugin on itself. Doing so makes `dart analyze`
# (and pub.dev's pana) try to bootstrap the plugin against this package,
# which only depends on `custom_lint_builder` (not `custom_lint`), and the
# setup fails. Consumers — and the bundled example — enable custom_lint
# in their own analysis_options.yaml instead.
analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
